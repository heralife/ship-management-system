<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA 리다이렉트
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = '/?p=' + encodeURIComponent(path + search) + (hash ? '&h=' + encodeURIComponent(hash) : '');
      window.location.replace('/ship-management-system' + redirect);
    </script>
  </head>
  <body></body>
</html>
